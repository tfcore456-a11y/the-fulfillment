<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Fulfillment</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --tf-navy: #0C2D5A; --tf-blue: #1A4A8A; --tf-blue-light: #2260B0;
  --tf-gold: #C9A84C; --tf-gold-light: #E8C97A;
  --tf-white: #FFFFFF; --tf-surface: #F0F4FA;
  --tf-border: rgba(201,168,76,0.25); --tf-text: #0C2D5A; --tf-muted: #4A6A9A;
  --radius-md: 8px; --radius-lg: 12px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--tf-surface); min-height: 100vh; }
.app { max-width: 640px; margin: 0 auto; padding: 0 0 3rem; }
.topbar { background: var(--tf-navy); padding: 0.9rem 1.25rem; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid var(--tf-gold); position: sticky; top: 0; z-index: 10; }
.topbar img { height: 44px; width: 44px; object-fit: contain; border-radius: 6px; flex-shrink: 0; }
.topbar-text h1 { font-size: 17px; font-weight: 600; color: #fff; letter-spacing: -0.2px; line-height: 1.2; }
.topbar-text p { font-size: 11px; color: var(--tf-gold-light); margin-top: 2px; }
.tab-row { display: flex; background: var(--tf-navy); padding: 0 1rem; border-bottom: 1px solid rgba(201,168,76,0.2); overflow-x: auto; position: sticky; top: 66px; z-index: 9; }
.tab { height: 40px; padding: 0 13px; border: none; border-bottom: 2px solid transparent; font-size: 13px; cursor: pointer; background: transparent; color: rgba(255,255,255,0.55); display: flex; align-items: center; gap: 5px; white-space: nowrap; margin-bottom: -1px; }
.tab.active { color: var(--tf-gold); border-bottom-color: var(--tf-gold); font-weight: 600; }
.body { padding: 1.25rem; }
.card { background: #fff; border: 1px solid var(--tf-border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; }
.card-title { font-size: 15px; font-weight: 600; color: var(--tf-navy); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 12px; color: var(--tf-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
input, select { width: 100%; height: 42px; padding: 0 12px; font-size: 14px; border: 1px solid rgba(12,45,90,0.2); border-radius: var(--radius-md); background: #fff; color: var(--tf-text); outline: none; }
input:focus, select:focus { border-color: var(--tf-blue-light); box-shadow: 0 0 0 3px rgba(26,74,138,0.1); }
.other-input { margin-top: 8px; display: none; }
.btn-submit { width: 100%; height: 46px; background: linear-gradient(135deg, var(--tf-blue), var(--tf-navy)); border: 1px solid var(--tf-gold); border-radius: var(--radius-md); color: var(--tf-gold-light); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-submit:disabled { opacity: 0.45; }
.status-msg { font-size: 13px; padding: 10px 14px; border-radius: var(--radius-md); margin-top: 10px; display: none; }
.status-msg.success { background: #E8F5EF; color: #1A6B3C; display: block; border: 1px solid #A8D5BC; }
.status-msg.error { background: #FDECEA; color: #A32D2D; display: block; border: 1px solid #F5BBBB; }
.status-msg.loading { background: var(--tf-surface); color: var(--tf-muted); display: block; border: 1px solid var(--tf-border); }
.history-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(201,168,76,0.15); }
.history-item:last-child { border-bottom: none; }
.badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.badge-shp { background: #EEEDFE; color: #3C3489; }
.badge-sd { background: #FCEBEB; color: #791F1F; }
.badge-jt { background: #E6F1FB; color: #0C447C; }
.badge-post { background: #EAF3DE; color: #27500A; }
.badge-lazada { background: #FAEEDA; color: #633806; }
.badge-flash { background: #FBEAF0; color: #72243E; }
.badge-thpost { background: #F1EFE8; color: #444441; }
.item-info { flex: 1; }
.item-store { font-size: 14px; font-weight: 600; color: var(--tf-navy); }
.item-meta { font-size: 12px; color: var(--tf-muted); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.item-qty { font-size: 14px; font-weight: 600; color: var(--tf-navy); white-space: nowrap; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--tf-muted); font-size: 14px; line-height: 2; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.stat-card { background: var(--tf-navy); border-radius: var(--radius-md); padding: 16px; }
.stat-label { font-size: 11px; color: var(--tf-gold-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 700; color: #fff; }
.filter-row { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; }
.filter-row select { height: 34px; font-size: 13px; flex: 1; }
.filter-label { font-size: 12px; color: var(--tf-muted); white-space: nowrap; }
.summary-store { border: 1px solid var(--tf-border); border-radius: var(--radius-md); margin-bottom: 10px; overflow: hidden; }
.summary-store-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--tf-navy); }
.summary-store-name { font-size: 14px; font-weight: 600; color: var(--tf-gold-light); }
.summary-store-total { font-size: 13px; color: var(--tf-gold); font-weight: 600; }
.summary-store-body { padding: 8px 14px; background: #fff; }
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(201,168,76,0.1); }
.summary-row:last-child { border-bottom: none; }
.summary-qty { font-size: 13px; font-weight: 600; color: var(--tf-navy); }
.sheets-setup { background: var(--tf-surface); border-radius: var(--radius-md); padding: 1rem; margin-bottom: 1rem; border: 1px solid var(--tf-border); }
.sheets-setup p { font-size: 13px; color: var(--tf-muted); margin-bottom: 8px; line-height: 1.6; }
.sheets-input-row { display: flex; gap: 8px; }
.sheets-input-row input { flex: 1; }
.btn-sm { height: 36px; padding: 0 14px; background: transparent; border: 1px solid rgba(12,45,90,0.2); border-radius: var(--radius-md); font-size: 13px; cursor: pointer; color: var(--tf-navy); white-space: nowrap; }
.connected-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: #1A6B3C; background: #E8F5EF; padding: 4px 12px; border-radius: 20px; border: 1px solid #A8D5BC; }
</style>
</head>

    <div class="topbar-text">
      <h1>The Fulfillment</h1>
      <p>ระบบบันทึกการส่งสินค้า</p>
    </div>
  </div>
  <div class="tab-row">
    <button class="tab active" onclick="showTab('form')">+ บันทึกใหม่</button>
    <button class="tab" onclick="showTab('summary')">สรุป</button>
    <button class="tab" onclick="showTab('history')">ประวัติ</button>
    <button class="tab" onclick="showTab('settings')">ตั้งค่า</button>
  </div>
  <div class="body">
    <div id="tab-form">
      <div class="card">
        <div class="card-title">🚚 รายการส่งสินค้า</div>
        <div class="form-grid">
          <div class="form-group full">
            <label for="storeName">ร้านค้า / ลูกค้า</label>
            <select id="storeName" onchange="toggleOther(this.value)">
              <option value="">-- เลือกร้านค้า --</option>
              <option value="Zenji">Zenji</option>
              <option value="The Labatorian">The Labatorian</option>
              <option value="Irin Bun">Irin Bun</option>
              <option value="Papifeed">Papifeed</option>
              <option value="Fluffy Friends">Fluffy Friends</option>
              <option value="Kanda Bag">Kanda Bag</option>
              <option value="Hi Genius">Hi Genius</option>
              <option value="Hewson">Hewson</option>
              <option value="Herbe">Herbe</option>
              <option value="Gosleek">Gosleek</option>
              <option value="__other__">อื่นๆ (ระบุชื่อ)</option>
            </select>
            <input type="text" id="otherStore" class="other-input" placeholder="ระบุชื่อร้านค้า..." />
          </div>
          <div class="form-group">
            <label for="qty">จำนวนชิ้น</label>
            <input type="number" id="qty" placeholder="0" min="1" />
          </div>
          <div class="form-group">
            <label for="carrier">บริษัทขนส่ง</label>
            <select id="carrier">
              <option value="">-- เลือกขนส่ง --</option>
              <option value="SHP">SHP</option>
              <option value="ส่งด่วน">ส่งด่วน</option>
              <option value="J&T">J&T</option>
              <option value="เปิดไปรษณีย์">เปิดไปรษณีย์</option>
              <option value="Lazada">Lazada</option>
              <option value="Flash">Flash</option>
              <option value="ไปรษณีย์ไทย">ไปรษณีย์ไทย</option>
            </select>
          </div>
          <div class="form-group full">
            <label for="shipDate">วันที่ส่ง</label>
            <input type="date" id="shipDate" />
          </div>
        </div>
        <button class="btn-submit" id="submitBtn" onclick="submitEntry()">✈️ บันทึกและส่งไป Sheets</button>
        <div id="statusMsg" class="status-msg"></div>
      </div>
    </div>
    <div id="tab-summary" style="display:none;">
      <div class="stat-grid" id="statCards"></div>
      <div class="card">
        <div class="card-title">🏪 สรุปแต่ละร้านค้า</div>
        <div class="filter-row">
          <span class="filter-label">กรองวันที่:</span>
          <select id="filterDate" onchange="renderSummary()">
            <option value="all">ทั้งหมด</option>
            <option value="today">วันนี้</option>
            <option value="week">7 วันล่าสุด</option>
            <option value="month">เดือนนี้</option>
          </select>
        </div>
        <div id="summaryList"></div>
      </div>
    </div>
    <div id="tab-history" style="display:none;">
      <div class="card" id="historyList"><div class="empty-state">📭<br>ยังไม่มีรายการ</div></div>
    </div>
    <div id="tab-settings" style="display:none;">
      <div class="card">
        <div class="card-title">🔗 เชื่อมต่อ Google Sheets</div>
        <div class="sheets-setup">
          <p>วาง URL จาก Google Apps Script ด้านล่างนี้</p>
          <div class="sheets-input-row">
            <input type="text" id="sheetsUrl" placeholder="https://script.google.com/macros/s/.../exec" />
            <button class="btn-sm" onclick="saveUrl()">บันทึก</button>
          </div>
        </div>
        <div id="connectedStatus"></div>
      </div>
      <div class="card">
        <div class="card-title">💾 ข้อมูลในเครื่อง</div>
        <p style="font-size:13px;color:var(--tf-muted);" id="localCount">ยังไม่มีข้อมูล</p>
        <button class="btn-sm" style="margin-top:10px;" onclick="clearLocal()">ล้างข้อมูลในเครื่อง</button>
      </div>
    </div>
  </div>
</div>
<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwDyYHbeUvUVO_w2Erzj-VgkPe-YDMUhoTDsDFSgA-D0E8iZi5iXDydBNnNsEYMJcX_Vg/exec';
let entries = JSON.parse(localStorage.getItem('tfEntries') || '[]');
let sheetsUrl = localStorage.getItem('tfSheetsUrl') || SHEETS_URL;
document.getElementById('shipDate').value = new Date().toISOString().split('T')[0];
document.getElementById('sheetsUrl').value = sheetsUrl;
if (sheetsUrl) showConnected();
updateLocalCount();
const badgeMap = {'SHP':'badge-shp','ส่งด่วน':'badge-sd','J&T':'badge-jt','เปิดไปรษณีย์':'badge-post','Lazada':'badge-lazada','Flash':'badge-flash','ไปรษณีย์ไทย':'badge-thpost'};
function toggleOther(val) {
  const el = document.getElementById('otherStore');
  el.style.display = val==='__other__' ? 'block' : 'none';
  if (val!=='__other__') el.value='';
}
function showTab(tab) {
  ['form','summary','history','settings'].forEach(t => { document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none'; });
  document.querySelectorAll('.tab').forEach((btn,i) => { btn.classList.toggle('active', ['form','summary','history','settings'][i]===tab); });
  if (tab==='summary') renderSummary();
  if (tab==='history') renderHistory();
  if (tab==='settings') updateLocalCount();
}
function saveUrl() {
  const url = document.getElementById('sheetsUrl').value.trim();
  if (!url) return;
  localStorage.setItem('tfSheetsUrl', url);
  sheetsUrl = url;
  showConnected();
}
function showConnected() { document.getElementById('connectedStatus').innerHTML = '<span class="connected-badge">✓ เชื่อมต่อแล้ว</span>'; }
function updateLocalCount() { document.getElementById('localCount').textContent = entries.length > 0 ? 'มีข้อมูลบันทึกไว้ '+entries.length+' รายการ' : 'ยังไม่มีข้อมูล'; }
function getFiltered() {
  const f = document.getElementById('filterDate').value;
  const now = new Date();
  return entries.filter(e => {
    if (f==='all') return true;
    const d = new Date(e.shipDate);
    if (f==='today') return e.shipDate===now.toISOString().split('T')[0];
    if (f==='week') return (now-d)<=7*86400000;
    if (f==='month') return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true;
  });
}
function renderSummary() {
  const filtered = getFiltered();
  const totalQty = filtered.reduce((s,e)=>s+e.qty,0);
  document.getElementById('statCards').innerHTML = '<div class="stat-card"><div class="stat-label">รวมชิ้น</div><div class="stat-value">'+totalQty.toLocaleString()+'</div></div><div class="stat-card"><div class="stat-label">รายการทั้งหมด</div><div class="stat-value">'+filtered.length+'</div></div>';
  const storeMap = {};
  filtered.forEach(e => {
    const s = e.storeName||'ไม่ระบุ';
    if (!storeMap[s]) storeMap[s]={total:0,carriers:{}};
    storeMap[s].total+=e.qty;
    storeMap[s].carriers[e.carrier]=(storeMap[s].carriers[e.carrier]||0)+e.qty;
  });
  const el = document.getElementById('summaryList');
  if (!Object.keys(storeMap).length) { el.innerHTML='<div class="empty-state">ยังไม่มีข้อมูล</div>'; return; }
  el.innerHTML = Object.entries(storeMap).sort((a,b)=>b[1].total-a[1].total).map(([store,data])=>'<div class="summary-store"><div class="summary-store-header"><span class="summary-store-name">🏪 '+store+'</span><span class="summary-store-total">'+data.total.toLocaleString()+' ชิ้น</span></div><div class="summary-store-body">'+Object.entries(data.carriers).sort((a,b)=>b[1]-a[1]).map(([c,q])=>'<div class="summary-row"><span class="badge '+(badgeMap[c]||'badge-thpost')+'">'+c+'</span><span class="summary-qty">'+q.toLocaleString()+' ชิ้น</span></div>').join('')+'</div></div>').join('');
}
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!entries.length) { el.innerHTML='<div class="empty-state">📭<br>ยังไม่มีรายการ</div>'; return; }
  el.innerHTML = [...entries].reverse().slice(0,30).map(e=>'<div class="history-item"><div class="item-info"><div class="item-store">'+(e.storeName||'—')+'</div><div class="item-meta"><span class="badge '+(badgeMap[e.carrier]||'badge-thpost')+'">'+e.carrier+'</span><span>'+e.shipDate+'</span></div></div><div class="item-qty">'+e.qty+' ชิ้น</div></div>').join('');
}
async function submitEntry() {
  const storeVal = document.getElementById('storeName').value;
  const storeName = storeVal==='__other__' ? document.getElementById('otherStore').value.trim() : storeVal;
  const qty = document.getElementById('qty').value.trim();
  const carrier = document.getElementById('carrier').value;
  const shipDate = document.getElementById('shipDate').value;
  if (!qty||!carrier||!shipDate) { showStatus('กรุณากรอกข้อมูลให้ครบ: จำนวน, ขนส่ง, วันที่','error'); return; }
  if (storeVal==='__other__'&&!storeName) { showStatus('กรุณาระบุชื่อร้านค้า','error'); return; }
  const entry = {storeName, qty:parseInt(qty), carrier, shipDate, timestamp:new Date().toISOString()};
  entries.push(entry);
  localStorage.setItem('tfEntries', JSON.stringify(entries));
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  showStatus('กำลังส่งข้อมูลไป Google Sheets...','loading');
  try {
    await fetch(sheetsUrl, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry)});
    showStatus('✓ บันทึกสำเร็จ — ส่งไป Google Sheets แล้ว','success');
  } catch {
    showStatus('✓ บันทึกในเครื่องแล้ว — ส่งไป Sheets ไม่สำเร็จ','error');
  }
  document.getElementById('qty').value='';
  document.getElementById('carrier').value='';
  document.getElementById('storeName').value='';
  document.getElementById('otherStore').value='';
  document.getElementById('otherStore').style.display='none';
  document.getElementById('shipDate').value=new Date().toISOString().split('T')[0];
  btn.disabled=false;
}
function showStatus(msg,type) {
  const el=document.getElementById('statusMsg');
  el.className='status-msg '+type;
  el.textContent=msg;
  if(type==='success') setTimeout(()=>{el.style.display='none';},4000);
}
function clearLocal() {
  if(!confirm('ลบข้อมูลทั้งหมดในเครื่องนี้?')) return;
  entries=[];
  localStorage.removeItem('tfEntries');
  updateLocalCount();
}
</script>
</body>
</html>
